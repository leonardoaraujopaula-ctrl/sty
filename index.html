<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Função para adicionar um cliente à lista
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('form-cadastro');
            const listaClientes = document.getElementById('clientes-lista-ul');

            // Quando o formulário for enviado
            form.addEventListener('submit', function(event) {
                event.preventDefault();  // Evita o envio padrão do formulário (recarregar a página)

                // Coletando os dados do formulário
                const nome = document.getElementById('nome').value;
                const email = document.getElementById('email').value;
                const telefone = document.getElementById('tel').value;
                const tipo = document.getElementById('tipo').value;

                // Verifica se os campos obrigatórios estão preenchidos
                if (!nome || !email) {
                    alert('Por favor, preencha o nome e o e-mail.');
                    return;
                }

                // Cria um novo item de lista para o cliente
                const novoCliente = document.createElement('li');
                novoCliente.textContent = `${nome} - ${email} - ${telefone ? telefone : 'Não informado'} - ${tipo === 'pessoa-fisica' ? 'Pessoa Física' : 'Pessoa Jurídica'}`;

                // Adiciona o novo cliente à lista
                listaClientes.appendChild(novoCliente);

                // Limpa o formulário após o envio
                form.reset();
            });
        });
    </script>
</head>
<body>

    <div class="container">
        <form id="form-cadastro">
            <h2>Novo Cliente</h2>
            <p>Preencha as informações abaixo para realizar o registro.</p>

            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="email@exemplo.com" required>
                </div>
                <div class="input-group">
                    <label for="tel">Telefone</label>
                    <input type="tel" id="tel" name="tel" placeholder="(11) 99999-9999">
                </div>
            </div>

            <div class="input-group">
                <label for="tipo">Tipo de Cliente</label>
                <select id="tipo" name="tipo">
                    <option value="pessoa-fisica">Pessoa Física</option>
                    <option value="pessoa-juridica">Pessoa Jurídica</option>
                </select>
            </div>

            <button type="submit" class="btn-enviar">Cadastrar Cliente</button>
        </form>

        <!-- Lista de Clientes Cadastrados -->
        <div id="clientes-lista">
            <h3>Clientes Cadastrados:</h3>
            <ul id="clientes-lista-ul">
                <!-- A lista estará vazia inicialmente -->
            </ul>
        </div>
    </div>

</body>
</html>
